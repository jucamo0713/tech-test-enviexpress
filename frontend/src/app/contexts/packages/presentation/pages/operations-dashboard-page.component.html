<app-navbar />

<main class="app-shell">
  <section class="topbar">
    <div>
      <p class="eyebrow">Enviexpress</p>
      <h1>Operación de paquetes</h1>
    </div>
    <div class="session">
      <button type="button" (click)="refresh()">Refrescar sesión</button>
    </div>
  </section>

  <section class="workspace">
    <app-packages-panel
      [packages]="packages()"
      [isAdmin]="isAdmin()"
      [canCreate]="canCreatePackages()"
      (createPackage)="createPackage($event)"
      (updatePackage)="updatePackage($event)"
      (deletePackage)="deletePackage($event)"
      (filtersChange)="applyFilters($event)"
      (selectPackage)="openPackage($event)"
    />
    <app-package-status-panel
      [selectedPackage]="selectedPackage()"
      [streamMessage]="streamMessage()"
      (updateStatus)="updateStatus($event)"
      (close)="closePackage()"
    />
  </section>
</main>
