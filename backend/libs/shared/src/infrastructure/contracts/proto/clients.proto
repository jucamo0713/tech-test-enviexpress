syntax = "proto3";

package clients;

service ClientsService {
  rpc Health (HealthRequest) returns (HealthResponse);
  rpc ListClients (ListClientsRequest) returns (ListClientsResponse);
  rpc GetClient (GetClientRequest) returns (ClientResponse);
  rpc GetClientByEmail (GetClientByEmailRequest) returns (ClientResponse);
  rpc CreateClient (CreateClientRequest) returns (ClientResponse);
  rpc UpdateClient (UpdateClientRequest) returns (ClientResponse);
  rpc DeleteClient (DeleteClientRequest) returns (DeleteClientResponse);
}

message HealthRequest {}

message HealthResponse {
  string status = 1;
}

message ListClientsRequest {
  int32 page = 1;
  int32 limit = 2;
}

message GetClientRequest {
  string id = 1;
}

message GetClientByEmailRequest {
  string email = 1;
}

message CreateClientRequest {
  string name = 1;
  string email = 2;
  string phone = 3;
  string address = 4;
}

message UpdateClientRequest {
  string id = 1;
  optional string name = 2;
  optional string email = 3;
  optional string phone = 4;
  optional string address = 5;
  optional bool active = 6;
}

message DeleteClientRequest {
  string id = 1;
}

message DeleteClientResponse {
  bool deleted = 1;
}

message ClientResponse {
  string id = 1;
  string name = 2;
  string email = 3;
  string phone = 4;
  string address = 5;
  bool active = 6;
  string createdAt = 7;
  string updatedAt = 8;
}

message ListClientsResponse {
  repeated ClientResponse clients = 1;
  int32 page = 2;
  int32 limit = 3;
  int32 total = 4;
  int32 totalPages = 5;
}
