syntax = "proto3";

package users;

service UsersService {
  rpc Health (HealthRequest) returns (HealthResponse);
  rpc GetUserByEmail (GetUserByEmailRequest) returns (UserResponse);
  rpc GetUserById (GetUserByIdRequest) returns (UserResponse);
  rpc CreateClientUser (CreateClientUserRequest) returns (UserResponse);
  rpc ListRegisteredClientIds (ListRegisteredClientIdsRequest) returns (ListRegisteredClientIdsResponse);
  rpc CountRegisteredClients (CountRegisteredClientsRequest) returns (CountRegisteredClientsResponse);
  rpc ListOperators (ListOperatorsRequest) returns (ListOperatorsResponse);
  rpc CreateOperator (CreateOperatorRequest) returns (UserResponse);
  rpc RevokeOperatorAccess (RevokeOperatorAccessRequest) returns (UserResponse);
}

message HealthRequest {}

message HealthResponse {
  string status = 1;
}

message GetUserByEmailRequest {
  string email = 1;
}

message GetUserByIdRequest {
  string id = 1;
}

message UserResponse {
  string id = 1;
  string email = 2;
  string passwordHash = 3;
  string name = 4;
  string role = 5;
  string createdAt = 6;
  string updatedAt = 7;
  optional string clientId = 8;
  bool active = 9;
}

message CreateClientUserRequest {
  string email = 1;
  string passwordHash = 2;
  string name = 3;
  string clientId = 4;
}

message ListRegisteredClientIdsRequest {
  repeated string clientIds = 1;
}

message ListRegisteredClientIdsResponse {
  repeated string clientIds = 1;
}

message CountRegisteredClientsRequest {}

message CountRegisteredClientsResponse {
  int32 total = 1;
}

message ListOperatorsRequest {
  int32 page = 1;
  int32 limit = 2;
}

message ListOperatorsResponse {
  repeated UserResponse users = 1;
  int32 page = 2;
  int32 limit = 3;
  int32 total = 4;
  int32 totalPages = 5;
}

message CreateOperatorRequest {
  string email = 1;
  string password = 2;
  string name = 3;
}

message RevokeOperatorAccessRequest {
  string id = 1;
}
