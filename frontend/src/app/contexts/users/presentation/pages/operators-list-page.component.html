<main class="operators-page">
  <section class="topbar">
    <div>
      <p class="eyebrow">Usuarios</p>
      <h1>Operadores</h1>
    </div>
    <a routerLink="/operations">Volver a paquetes</a>
  </section>

  <p class="error" *ngIf="errorMessage()">{{ errorMessage() }}</p>

  <section class="create-panel">
    <h2>Nuevo operador</h2>
    <form [formGroup]="form" (ngSubmit)="createOperator()">
      <label>
        Nombre
        <input type="text" formControlName="name" autocomplete="name" />
      </label>
      <label>
        Correo
        <input type="email" formControlName="email" autocomplete="email" />
      </label>
      <label>
        Contrasena
        <input type="password" formControlName="password" autocomplete="new-password" />
      </label>
      <button type="submit" [disabled]="isCreating()">
        {{ isCreating() ? 'Creando...' : 'Crear operador' }}
      </button>
    </form>
  </section>

  <p class="empty" *ngIf="isLoading()">Cargando operadores...</p>

  <section class="operators-list">
    <article class="operator-card" *ngFor="let operator of operators()">
      <div>
        <h2>{{ operator.name }}</h2>
        <p>{{ operator.email }}</p>
      </div>
      <span
        class="access-chip"
        [class.active]="operator.active"
        [class.revoked]="!operator.active"
      >
        {{ operator.active ? 'Acceso activo' : 'Acceso revocado' }}
      </span>
      <p>{{ formatDateTime(operator.createdAt) }}</p>
      <button
        type="button"
        class="danger"
        (click)="revokeAccess(operator)"
        [disabled]="!operator.active"
      >
        Revocar acceso
      </button>
    </article>
  </section>

  <nav class="pagination" *ngIf="total() > limit()">
    <button type="button" (click)="previousPage()" [disabled]="page() <= 1">
      Anterior
    </button>
    <span>Pagina {{ page() }} de {{ totalPages() }}</span>
    <button type="button" (click)="nextPage()" [disabled]="page() >= totalPages()">
      Siguiente
    </button>
  </nav>
</main>
