<main class="landing-page">
  <section class="hero">
    <p class="eyebrow">Enviexpress</p>
    <h1>Gestion y rastreo de paquetes</h1>
    <p class="summary">
      Consulta una guia sin iniciar sesion o entra a tu panel para revisar el historial.
    </p>
    <div class="actions">
      <a routerLink="/track">Rastrear pedido</a>
      <a routerLink="/register">Registrarme como cliente</a>
      <button *ngIf="session.hasSession(); else loginLink" type="button" (click)="goToPanel()">
        Ir a mi panel
      </button>
      <ng-template #loginLink>
        <a routerLink="/login">Iniciar sesion</a>
      </ng-template>
    </div>
  </section>
</main>
